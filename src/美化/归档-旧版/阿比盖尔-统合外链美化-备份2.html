<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>命定阿比盖尔-统合美化 v5</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --base-blue:#4a5a8a;--light-blue:#a8c0ff;--glow-blue:rgba(168,192,255,0.8);
      --mithril-white:#f0f8ff;--void-deep:#05081c;
      --panel:rgba(8,14,30,0.72);--panel-border:rgba(184,203,255,0.35);
      --name-plate:rgba(10,22,54,0.82);--name-plate-border:rgba(199,219,255,0.6);
      --portrait-w:clamp(108px,13vw,148px);--portrait-h:calc(var(--portrait-w)*1.33);
      --blur-strength:60px;--star-scale:1;
      --frame-color:rgba(168,192,255,0.5);--frame-glow:rgba(120,156,248,0.35);
    }
    html,body{margin:0;padding:0;min-height:100%;background:transparent}
    body{padding:12px;box-sizing:border-box;overflow:hidden;font-family:'Noto Serif SC','Microsoft YaHei',serif;color:#f0f4f8}

    /* ═══════ 背景层包裹器（仅覆盖边框内侧） ════ */
    /* 说明：承载全部背景特效，并通过 inset 内缩避免压住外绘边框。 */
    .bg-wrapper{
      /* 关键约束：背景内缩，不占用边框绘制区域。 */
      position:absolute;inset:6px;z-index:0;
      pointer-events:none;overflow:hidden;border-radius:inherit;
    }

    /* ═══════ 主容器（承载边框装饰和内容） ═══════════════ */
    /* 说明：容器本体不直接画边框，双层边框由伪元素外绘。 */
    .abby-yog-container{
      position:relative;width:min(100%,1160px);margin:16px auto;border-radius:6px;z-index:10;
      overflow:visible;
      box-sizing:border-box;
      isolation:isolate;
      /* 关键约束：边框与背景分层绘制，避免相互覆盖。 */
      border:none;outline:none;
      box-shadow:0 0 18px rgba(100,140,220,0.28);
    }
    .abby-yog-container::before,
    .abby-yog-container::after{
      content:'';position:absolute;pointer-events:none;border-radius:inherit;z-index:11;
    }
    .abby-yog-container::before{
      /* 外层主边框：提供主体轮廓与外发光。 */
      inset:0;border:2px solid rgba(168,192,255,0.88);
      box-shadow:0 0 12px rgba(100,140,220,0.35);
    }
    .abby-yog-container::after{
      /* 内层高光边框：补充层次感。 */
      inset:4px;border:1px solid rgba(200,220,255,0.48);
      box-shadow:inset 0 0 8px rgba(168,192,255,0.18);
    }
    /* 边框装饰元素 - 在底层容器上显示 */
    .frame-corner{position:absolute !important;width:22px !important;height:22px !important;pointer-events:none;z-index:12}
    .frame-corner::before,.frame-corner::after{content:'';position:absolute;background:var(--frame-color) !important;border-radius:1.5px}
    .frame-corner::before{width:100%;height:2.5px;top:0;left:0}
    .frame-corner::after{width:2.5px;height:100%;top:0;left:0}
    .fc-tl{top:-8px !important;left:-8px !important}.fc-tr{top:-8px !important;right:-8px !important;transform:scaleX(-1)}
    .fc-bl{bottom:-8px !important;left:-8px !important;transform:scaleY(-1)}.fc-br{bottom:-8px !important;right:-8px !important;transform:scale(-1)}
    /* 角落斜线装饰 */
    .frame-flourish{position:absolute !important;width:20px !important;height:20px !important;pointer-events:none;z-index:12;opacity:.65}
    .frame-flourish::before{content:'';position:absolute;width:145%;height:2.5px;top:50%;left:-22%;background:var(--frame-color) !important;transform:rotate(45deg);border-radius:1.5px}
    .ff-tl{top:-16px !important;left:-16px !important}.ff-tr{top:-16px !important;right:-16px !important;transform:scaleX(-1)}
    .ff-bl{top:-16px !important;left:-16px !important;transform:scaleY(-1)}.ff-br{top:-16px !important;right:-16px !important;transform:scale(-1)}
    /* 花边圆点装饰 */
    .frame-dot{position:absolute !important;width:9px !important;height:9px !important;border-radius:50%;background:radial-gradient(circle,var(--light-blue),var(--glow-blue)) !important;box-shadow:0 0 8px var(--glow-blue) !important;pointer-events:none;z-index:12;opacity:.75}
    .fd-top{top:-12px !important;left:50%;transform:translateX(-50%)}.fd-bottom{bottom:-12px !important;left:50%;transform:translateX(-50%)}
    .fd-left{left:-12px !important;top:50%;transform:translateY(-50%)}.fd-right{right:-12px !important;top:50%;transform:translateY(-50%)}
    /* 边框中段装饰线 */
    .frame-mid{position:absolute !important;pointer-events:none;z-index:12}
    .frame-mid::before{content:'';position:absolute;background:linear-gradient(90deg,transparent,var(--frame-color),transparent) !important}
    .fm-top{top:-12px !important;left:18%;right:18%;height:1.5px}.fm-top::before{width:100%;height:1.5px}
    .fm-bottom{bottom:-12px !important;left:18%;right:18%;height:1.5px}.fm-bottom::before{width:100%;height:1.5px}
    .fm-left{left:-12px !important;top:18%;bottom:18%;width:1.5px}
    .fm-left::before{background:linear-gradient(180deg,transparent,var(--frame-color),transparent) !important;width:1.5px;height:100%}
    .fm-right{right:-12px !important;top:18%;bottom:18%;width:1.5px}
    .fm-right::before{background:linear-gradient(180deg,transparent,var(--frame-color),transparent) !important;width:1.5px;height:100%}
    /* 边框1/4和3/4处小圆点 */
    .frame-qdot{position:absolute !important;width:5px !important;height:5px !important;border-radius:50%;background:var(--frame-color) !important;box-shadow:0 0 4px var(--frame-glow) !important;pointer-events:none;z-index:12;opacity:.55}
    .fq-top1{top:-12px !important;left:25%}.fq-top2{top:-12px !important;left:75%}
    .fq-bottom1{bottom:-12px !important;left:25%}.fq-bottom2{bottom:-12px !important;left:75%}
    .fq-left1{left:-12px !important;top:25%}.fq-left2{left:-12px !important;top:75%}
    .fq-right1{right:-12px !important;top:25%}.fq-right2{right:-12px !important;top:75%}

    /* ═══════ 极光层（位于深蓝底色之上） ═══════ */
    /* 说明：用于补充底部流动光感，不参与交互。 */
    .aurora-layer{
      /* 关键约束：容器内 absolute，且高于深蓝底层。 */
      position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden;opacity:.68;mix-blend-mode:screen
    }
    .aurora-band{position:absolute;bottom:0;left:0;width:200%;height:100%;mix-blend-mode:screen}
    .aurora-1{
      background:linear-gradient(90deg,transparent 0%,rgba(80,180,120,0.12) 15%,rgba(100,200,180,0.18) 30%,rgba(80,160,220,0.15) 50%,rgba(120,140,255,0.12) 70%,rgba(80,180,120,0.1) 85%,transparent 100%);
      filter:blur(35px);animation:aurora-flow 22s ease-in-out infinite alternate;
    }
    .aurora-2{
      background:linear-gradient(90deg,transparent 0%,rgba(60,200,160,0.1) 18%,rgba(100,180,255,0.14) 38%,rgba(140,120,255,0.11) 58%,rgba(80,200,140,0.12) 78%,transparent 100%);
      filter:blur(40px);animation:aurora-flow-2 28s ease-in-out infinite alternate;bottom:-8%;
    }
    .aurora-3{
      background:linear-gradient(90deg,transparent 5%,rgba(100,220,180,0.08) 20%,rgba(80,180,240,0.1) 40%,rgba(120,160,255,0.08) 60%,rgba(100,200,160,0.06) 80%,transparent 95%);
      filter:blur(50px);animation:aurora-flow 32s ease-in-out infinite alternate-reverse;bottom:2%;
    }
    .aurora-wave{position:absolute;bottom:-10%;left:-15%;width:130%;height:80%;pointer-events:none;mix-blend-mode:screen;opacity:.3;background:repeating-linear-gradient(90deg,transparent,transparent 45px,rgba(100,220,180,0.06) 90px,rgba(80,180,240,0.05) 135px);filter:blur(28px);animation:aurora-wave-move 18s linear infinite}
    .aurora-glow{position:absolute;bottom:5%;left:25%;width:50%;height:40%;border-radius:50%;background:radial-gradient(ellipse,rgba(100,200,180,0.1),transparent 70%);filter:blur(30px);animation:aurora-pulse 8s ease-in-out infinite alternate}

    /* ═══════ 深蓝背景系统（限制在容器内） ═══════════ */
    /* 说明：深蓝底色、星云和旋臂统一在此层裁剪。 */
    .bg-container{
      /* 关键约束：作为底色层，z-index 低于极光层。 */
      position:absolute;inset:0;overflow:hidden;z-index:1;background:var(--void-deep);border-radius:inherit
    }
    /* 基础背景渐变 */
    .void-base{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;background:
      radial-gradient(ellipse at 50% 25%,rgba(53,87,174,0.22) 0%,transparent 55%),
      radial-gradient(ellipse at 50% 75%,rgba(36,68,132,0.15) 0%,transparent 50%),
      rgba(5,8,28,0.82)}

    .nebula{position:absolute;inset:-18%;pointer-events:none;background:
      radial-gradient(50% 45% at 22% 22%,rgba(120,162,255,0.32),transparent 78%),
      radial-gradient(38% 35% at 72% 58%,rgba(106,138,235,0.26),transparent 74%),
      radial-gradient(30% 30% at 48% 82%,rgba(90,130,220,0.2),transparent 70%);
      filter:blur(22px);opacity:.78;animation:nebula-drift 46s ease-in-out infinite alternate}
    .nebula-2{position:absolute;inset:-16%;pointer-events:none;background:
      radial-gradient(35% 38% at 52% 12%,rgba(90,130,220,0.24),transparent 68%),
      radial-gradient(30% 30% at 28% 72%,rgba(140,170,255,0.2),transparent 72%),
      radial-gradient(25% 25% at 78% 38%,rgba(120,162,255,0.18),transparent 68%);
      filter:blur(26px);opacity:.62;animation:nebula-drift-2 62s ease-in-out infinite alternate}
    .nebula-3{position:absolute;inset:-14%;pointer-events:none;background:
      radial-gradient(40% 35% at 12% 52%,rgba(100,150,230,0.18),transparent 70%),
      radial-gradient(28% 28% at 62% 28%,rgba(80,120,210,0.16),transparent 65%);
      filter:blur(30px);opacity:.45;animation:nebula-drift 52s ease-in-out infinite alternate-reverse}

    .galaxy-arm{position:absolute;width:300%;height:300%;filter:blur(var(--blur-strength));mix-blend-mode:screen;opacity:.4;pointer-events:none}
    .arm-primary{top:-100%;left:-100%;transform-origin:20% 80%;background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,transparent 140deg,rgba(74,20,140,0.3) 180deg,rgba(168,192,255,0.1) 220deg,transparent 260deg,transparent 360deg);animation:mech-spin 120s linear infinite}
    .arm-secondary{top:-100%;left:-100%;transform-origin:80% 20%;background:conic-gradient(from 180deg at 50% 50%,transparent 0deg,transparent 120deg,rgba(0,229,255,0.15) 160deg,rgba(168,192,255,0.05) 200deg,transparent 240deg,transparent 360deg);animation:mech-spin 90s linear infinite reverse}

    /* ═══════ 星屑层（8层叠加） ═══════ */
    /* 说明：通过粒径、透明度和速度差制造纵深。 */
    .star-layer{
      /* 关键约束：不用 fixed，保持在容器层叠上下文中。 */
      position:absolute;inset:0;background-repeat:repeat;mix-blend-mode:screen;pointer-events:none;z-index:4
    }

    /* 第1层：大颗粒 clockwise旋转 左上区域 */
    .stars-1{transform-origin:25% 20%;background-image:
      radial-gradient(1.5px 1.5px at 10% 15%,rgba(255,255,255,0.95),transparent),
      radial-gradient(1.2px 1.2px at 35% 48%,rgba(200,220,255,0.8),transparent),
      radial-gradient(1.6px 1.6px at 62% 32%,rgba(255,255,255,0.85),transparent),
      radial-gradient(1px 1px at 82% 68%,rgba(180,200,255,0.7),transparent),
      radial-gradient(1.3px 1.3px at 45% 85%,rgba(210,225,255,0.75),transparent),
      radial-gradient(1.1px 1.1px at 25% 72%,rgba(255,255,255,0.8),transparent);
      background-size:calc(160px*var(--star-scale));opacity:.65;animation:star-cw 260s linear infinite}

    /* 第2层：中颗粒 counter-clockwise旋转 右下区域 */
    .stars-2{transform-origin:72% 75%;background-image:
      radial-gradient(1.4px 1.4px at 12% 28%,rgba(255,255,255,0.9),transparent),
      radial-gradient(1.1px 1.1px at 40% 65%,rgba(168,192,255,0.8),transparent),
      radial-gradient(1.6px 1.6px at 68% 20%,rgba(220,230,255,0.85),transparent),
      radial-gradient(1.2px 1.2px at 85% 52%,rgba(255,255,255,0.75),transparent),
      radial-gradient(1px 1px at 30% 82%,rgba(200,210,255,0.7),transparent),
      radial-gradient(1.3px 1.3px at 55% 38%,rgba(255,255,255,0.8),transparent);
      background-size:calc(200px*var(--star-scale));opacity:.55;animation:star-ccw 200s linear infinite}

    /* 第3层：中颗粒 clockwise旋转 左下区域 */
    .stars-3{transform-origin:20% 82%;background-image:
      radial-gradient(2px 2px at 18% 38%,rgba(255,255,255,0.92),transparent),
      radial-gradient(1.8px 1.8px at 52% 12%,rgba(168,192,255,0.85),transparent),
      radial-gradient(1.6px 1.6px at 75% 58%,rgba(200,215,255,0.75),transparent),
      radial-gradient(1.9px 1.9px at 38% 78%,rgba(255,255,255,0.8),transparent),
      radial-gradient(1.5px 1.5px at 62% 88%,rgba(180,200,255,0.7),transparent),
      radial-gradient(1.7px 1.7px at 28% 22%,rgba(255,255,255,0.85),transparent);
      background-size:calc(280px*var(--star-scale));opacity:.48;animation:star-cw 160s linear infinite}

    /* 第4层：大颗粒 counter-clockwise旋转 右上区域 */
    .stars-4{transform-origin:82% 15%;background-image:
      radial-gradient(2.4px 2.4px at 15% 45%,rgba(255,255,255,0.95),transparent),
      radial-gradient(2.2px 2.2px at 48% 22%,rgba(180,200,255,0.88),transparent),
      radial-gradient(2px 2px at 72% 68%,rgba(220,235,255,0.82),transparent),
      radial-gradient(1.8px 1.8px at 30% 32%,rgba(255,255,255,0.9),transparent),
      radial-gradient(2.1px 2.1px at 58% 85%,rgba(200,220,255,0.75),transparent);
      background-size:calc(380px*var(--star-scale));opacity:.38;animation:star-ccw 280s linear infinite}

    /* 第5层：中等 drift旋转 中央区域 */
    .stars-5{transform-origin:42% 52%;background-image:
      radial-gradient(2.6px 2.6px at 8% 20%,rgba(255,255,255,1),transparent),
      radial-gradient(2.2px 2.2px at 30% 55%,rgba(200,220,255,0.92),transparent),
      radial-gradient(2.8px 2.8px at 52% 35%,rgba(255,255,255,0.95),transparent),
      radial-gradient(1.9px 1.9px at 70% 75%,rgba(180,200,255,0.88),transparent),
      radial-gradient(2.3px 2.3px at 88% 12%,rgba(255,255,255,0.92),transparent),
      radial-gradient(2px 2px at 25% 88%,rgba(200,210,255,0.8),transparent);
      background-size:calc(450px*var(--star-scale));opacity:.42;animation:star-drift 85s linear infinite alternate}

    /* 第6层：小颗粒 diagonal旋转 左中区域 */
    .stars-6{transform-origin:32% 62%;background-image:
      radial-gradient(.8px .8px at 6% 12%,rgba(255,255,255,0.6),transparent),
      radial-gradient(.7px .7px at 22% 40%,rgba(200,220,255,0.5),transparent),
      radial-gradient(.9px .9px at 45% 25%,rgba(255,255,255,0.55),transparent),
      radial-gradient(.6px .6px at 62% 65%,rgba(180,200,255,0.45),transparent),
      radial-gradient(.8px .8px at 78% 32%,rgba(255,255,255,0.5),transparent),
      radial-gradient(.7px .7px at 90% 78%,rgba(210,225,255,0.45),transparent),
      radial-gradient(.6px .6px at 15% 72%,rgba(255,255,255,0.48),transparent),
      radial-gradient(.75px .75px at 55% 92%,rgba(200,220,255,0.42),transparent);
      background-size:calc(120px*var(--star-scale));opacity:.52;animation:star-diag 180s linear infinite}

    /* 第7层：大颗粒 drift-2旋转 右中区域 */
    .stars-7{transform-origin:58% 38%;background-image:
      radial-gradient(3.2px 3.2px at 20% 32%,rgba(255,255,255,0.95),transparent),
      radial-gradient(2.8px 2.8px at 55% 62%,rgba(190,210,255,0.88),transparent),
      radial-gradient(3px 3px at 78% 18%,rgba(255,255,255,0.92),transparent),
      radial-gradient(2.5px 2.5px at 35% 78%,rgba(200,220,255,0.8),transparent),
      radial-gradient(2.9px 2.9px at 62% 45%,rgba(255,255,255,0.85),transparent);
      background-size:calc(520px*var(--star-scale));opacity:.32;animation:star-drift-2 100s linear infinite alternate}

    /* 第8层：极小颗粒 orbit旋转 散布全屏 */
    .stars-8{transform-origin:45% 48%;background-image:
      radial-gradient(.5px .5px at 12% 22%,rgba(255,255,255,0.55),transparent),
      radial-gradient(.4px .4px at 32% 52%,rgba(200,220,255,0.45),transparent),
      radial-gradient(.55px .55px at 52% 15%,rgba(255,255,255,0.5),transparent),
      radial-gradient(.45px .45px at 68% 45%,rgba(180,200,255,0.42),transparent),
      radial-gradient(.5px .5px at 85% 68%,rgba(255,255,255,0.48),transparent),
      radial-gradient(.4px .4px at 25% 85%,rgba(200,210,255,0.4),transparent),
      radial-gradient(.48px .48px at 58% 82%,rgba(255,255,255,0.45),transparent),
      radial-gradient(.42px .42px at 78% 28%,rgba(180,220,255,0.38),transparent);
      background-size:calc(100px*var(--star-scale));opacity:.48;animation:star-orbit 220s linear infinite}

    .dust-layer{position:absolute;inset:-12%;pointer-events:none;background-image:radial-gradient(1px 1px at 30% 30%,rgba(255,255,255,0.8),transparent 1.5px);background-size:210px 210px;opacity:.18;animation:dust-fall 22s linear infinite}
    .particle-layer{position:absolute;inset:-25%;background-image:radial-gradient(1px 1px at 50% 50%,#fff,transparent);background-size:calc(350px*var(--star-scale));opacity:.18;z-index:0;animation:pan-slow 60s linear infinite;mix-blend-mode:screen}

    /* ═══════ 扫描光效（当前禁用，保留占位） ════════════════════════ */
    .scan-beam{display:none}

    /* ═══════ 核心卡片（内容区域，overflow:hidden） ═══════ */
    .abby-yog-card{
      position:relative;width:100%;height:100%;
      padding:clamp(24px,3vw,36px) clamp(20px,2.6vw,30px);border-radius:6px;overflow:hidden;z-index:3;
      color:#f0f4f8;font-family:'Noto Serif SC','Times New Roman',serif;
      transition:all .5s cubic-bezier(.25,.8,.25,1);
      min-height:min(400px,58vh);
      display:flex;flex-direction:column;
      animation:card-breathe 8s ease-in-out infinite;
      box-sizing:border-box;
    }
    .abby-yog-card *{box-sizing:border-box}

/* ═══════ CSS银钥机关（右上角-响应式尺寸） ═══════ */
    /* 使用clamp实现响应式定位：12px(小屏) → 24px(大屏)，保持右上角对齐
     * 容器尺寸：70px固定，确保内部ring不溢出
     * z-index:20确保在最上层 */
    .solar-key-system{position:absolute;top:clamp(12px,1.5vw,24px);right:clamp(12px,1.5vw,24px);width:70px;height:70px;z-index:20;pointer-events:none}
    /* 零位锚点：旋转中心 */
    .zero-anchor{position:absolute;top:50%;left:50%;width:0;height:0}
    /* 维度波纹效果 */
    .dimension-ripple{position:absolute;top:0;left:0;transform:translate(-50%,-50%);width:0;height:0;border-radius:50%;border:1px solid rgba(168,192,255,0.6);opacity:0;transition:all .5s ease}
    /* 轨道环基础样式 */
    .orbit-ring{position:absolute;border-radius:50%;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
    
    /* ═══════ 刻度盘外圈（外表盘-56px） ═══════ */
    /* mask透明区58%：保留外圈刻度显示区域 */
    .ring-outer{
      width:56px;height:56px;top:-28px;left:-28px;border-radius:50%;
      background:repeating-conic-gradient(from 0deg,var(--light-blue) 0deg 5deg,transparent 5deg 25deg);
      -webkit-mask:radial-gradient(transparent 58%,black 60%);mask:radial-gradient(transparent 58%,black 60%);
      opacity:.9;animation:ring-spin-rev 40s linear infinite;
    }
    
    /* ═══════ 刻度盘内圈（内表盘-40px） ═══════ */
    /* mask透明区52%：保留内圈显示区域 */
    .ring-inner{
      width:40px;height:40px;top:-20px;left:-20px;border-radius:50%;
      background:repeating-conic-gradient(from 0deg,var(--glow-blue) 0deg 3deg,transparent 3deg 13deg);
      -webkit-mask:radial-gradient(transparent 52%,black 54%);mask:radial-gradient(transparent 52%,black 54%);
      opacity:.65;animation:mech-spin 25s linear infinite;
    }
    
    /* ═══════ 钥匙组（钥匙齿+钥匙柄+钥匙杆） ═══════ */
    .eldritch-key-group{position:absolute;top:0;left:0;width:0;height:0;animation:mech-spin 20s linear infinite;z-index:15;filter:drop-shadow(0 0 3px rgba(168,192,255,0.5))}
    /* 钥匙柄：菱形 */
    .ek-handle{position:absolute;width:12px;height:12px;top:-6px;left:-6px;transform:rotate(45deg);border:2.5px double var(--mithril-white);box-shadow:0 0 6px var(--glow-blue);background:rgba(0,0,0,0.3)}
    .ek-handle::after{content:'';position:absolute;inset:2px;border:1px solid var(--light-blue);background:var(--glow-blue);opacity:.5}
    /* 钥匙杆 */
    .ek-shaft{position:absolute;width:16px;height:2px;top:-1px;left:6px;background:linear-gradient(to bottom,#8a9bb8,#fff 50%,#8a9bb8);transform-origin:left center;border-radius:0 2px 2px 0}
    /* 钥匙齿 */
    .ek-bit{
      position:absolute;width:5px;height:8px;top:-4px;left:22px;
      background:var(--mithril-white);
      -webkit-mask:conic-gradient(from 45deg at 2px 2px,transparent 270deg,black 0deg),linear-gradient(to bottom,black 40%,transparent 40%,transparent 60%,black 60%);
      mask:conic-gradient(from 45deg at 2px 2px,transparent 270deg,black 0deg),linear-gradient(to bottom,black 40%,transparent 40%,transparent 60%,black 60%);
      -webkit-mask-composite:xor;mask-composite:exclude;
      box-shadow:2px 0 0 var(--mithril-white);
    }
    .ek-bit::before{content:'';position:absolute;top:2px;left:-2px;width:3px;height:6px;border-right:2px solid var(--mithril-white);border-top:2px solid var(--mithril-white);border-bottom:2px solid var(--mithril-white)}

    /* ═══════ 头像+对话布局 ═══════ */
    .abby-dialog{position:relative;z-index:3;display:grid;grid-template-columns:auto 1fr;gap:clamp(6px,1vw,16px);align-items:start;min-height:var(--portrait-h);padding-right:clamp(50px,6vw,72px);padding-left:6px}

    .portrait-wrap{width:var(--portrait-w);height:var(--portrait-h);border-radius:4px;overflow:visible;position:relative;background:#03070f;transform:rotate(-0.6deg);transition:transform .25s ease,box-shadow .25s ease}
    .portrait-frame{position:absolute;inset:-6px;border-radius:6px;border:1.5px solid var(--frame-color);box-shadow:0 0 10px var(--frame-glow),0 0 18px rgba(80,116,206,0.15);pointer-events:none;z-index:2}
    .portrait-frame::before{content:'';position:absolute;inset:-4px;border-radius:8px;border:1px solid rgba(168,192,255,0.2);box-shadow:0 0 8px rgba(80,116,206,0.08)}
    .pf-corner{position:absolute;width:14px;height:14px;pointer-events:none;z-index:3}
    .pf-corner::before,.pf-corner::after{content:'';position:absolute;background:var(--frame-color);border-radius:1px}
    .pf-corner::before{width:100%;height:1.5px;top:0;left:0}
    .pf-corner::after{width:1.5px;height:100%;top:0;left:0}
    .pf-tl{top:-6px;left:-6px}.pf-tr{top:-6px;right:-6px;transform:scaleX(-1)}
    .pf-bl{bottom:-6px;left:-6px;transform:scaleY(-1)}.pf-br{bottom:-6px;right:-6px;transform:scale(-1)}
    .portrait-gem{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;z-index:4;background:radial-gradient(circle at 35% 35%,#fff,var(--light-blue) 50%,var(--base-blue));box-shadow:0 0 8px var(--glow-blue),0 0 14px rgba(120,156,248,0.3)}

    .portrait-inner{width:100%;height:100%;border-radius:4px;overflow:hidden;background-size:cover;background-position:center top;filter:contrast(1.08) saturate(1.05)}
    .portrait-overlay{position:absolute;inset:0;pointer-events:none;border-radius:4px;background:linear-gradient(to bottom,transparent 58%,rgba(5,10,24,0.78)),linear-gradient(135deg,rgba(200,220,255,0.1),transparent 44%);box-shadow:inset 0 0 10px rgba(0,0,0,0.45)}
    .portrait-wrap:hover{transform:rotate(0deg) scale(1.02);box-shadow:0 0 18px rgba(120,156,248,0.45),0 10px 22px rgba(0,0,0,0.58)}
    .dialog-main{min-width:0}

    /* 名字胶囊 */
    .name-plate{display:inline-flex;align-items:center;gap:10px;max-width:min(100%,460px);padding:6px 14px;margin-bottom:10px;border-radius:999px;border:1px solid var(--name-plate-border);background:linear-gradient(180deg,rgba(43,72,150,0.28),rgba(12,28,66,0.66)),var(--name-plate);box-shadow:0 0 10px rgba(126,163,255,0.34),inset 0 0 0 1px rgba(212,227,255,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
    .name-icon{width:10px;height:10px;border-radius:999px;flex:none;background:radial-gradient(circle,#fff,#a8c3ff 60%,rgba(168,195,255,0) 72%);box-shadow:0 0 8px rgba(194,215,255,0.8)}
    .abby-name-text{font-family:'Cinzel','Noto Serif SC',serif;font-size:clamp(1.06em,.98em + .24vw,1.34em);font-weight:700;letter-spacing:1.4px;color:#f7fbff;text-shadow:0 0 8px rgba(176,203,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ═══════ 华丽对话外框 ═══════ */
    .dialog-box{
      position:relative;border-radius:12px;
      padding:clamp(12px,1.6vw,18px) clamp(14px,2vw,20px);
      border:1px solid rgba(168,192,255,0.15);
      background:
        linear-gradient(180deg,rgba(24,34,72,0.08),rgba(6,10,24,0.25)),
        linear-gradient(135deg,rgba(60,90,160,0.03),transparent 50%),

        0 0 20px rgba(100,140,220,0.12),

    }
    /* 顶部高光线 */
    .dialog-box::before{
      content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(168,192,255,0.4),rgba(255,255,255,0.5),rgba(168,192,255,0.4),transparent);
      z-index:3;
    }
    /* 底部淡光线 */
    .dialog-box::after{
      content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;

    /* 内部装饰层 */
    .dialog-inner-deco{

    /* 角落小装饰 */
    .dialog-corner{position:absolute;width:16px;height:16px;pointer-events:none;z-index:4;opacity:.5}
    .dialog-corner::before,.dialog-corner::after{content:'';position:absolute;background:var(--frame-color);border-radius:1px}
    .dialog-corner::before{width:100%;height:1px;top:0;left:0}
    .dialog-corner::after{width:1px;height:100%;top:0;left:0}
    .dc-tl{top:4px;left:4px}.dc-tr{top:4px;right:4px;transform:scaleX(-1)}
    .dc-bl{bottom:4px;left:4px;transform:scaleY(-1)}.dc-br{bottom:4px;right:4px;transform:scale(-1)}

    .abby-yog-content{position:relative;z-index:2;color:#f0f4f8;font-size:clamp(.95em,.9em + .18vw,1.06em);line-height:1.78;letter-spacing:.2px;text-shadow:0 1px 3px rgba(0,0,0,0.6);word-break:break-word;font-family:'Noto Serif SC',serif}

    /* ═══════ 组件悬停效果 ═══════ */
    .dialog-box{transition:box-shadow .3s ease,transform .3s ease,border-color .3s ease,background .3s ease}
    .dialog-box:hover{
      box-shadow:0 0 25px rgba(100,140,220,0.25),0 12px 32px rgba(0,0,0,0.28),inset 0 1px 0 rgba(200,220,255,0.12),inset 0 0 35px rgba(80,116,206,0.06);
      transform:translateY(-2px);
      border-color:rgba(168,192,255,0.35);
      background:
        linear-gradient(180deg,rgba(24,34,72,0.12),rgba(6,10,24,0.32)),
        linear-gradient(135deg,rgba(60,90,160,0.05),transparent 50%),
        rgba(8,14,30,0.38);
    }
    /* 名字框悬停 */
    .name-plate{transition:box-shadow .3s ease,transform .3s ease}
    .name-plate:hover{box-shadow:0 0 14px rgba(126,163,255,0.45),inset 0 0 0 1px rgba(212,227,255,0.28);transform:scale(1.03)}
    /* 头像框悬停 */
    .portrait-wrap{transition:transform .25s ease,box-shadow .25s ease}
    .portrait-wrap:hover{transform:rotate(0deg) scale(1.04);box-shadow:0 0 22px rgba(120,156,248,0.5),0 10px 24px rgba(0,0,0,0.55)}
    .portrait-wrap:hover .portrait-gem{box-shadow:0 0 10px var(--glow-blue),0 0 18px rgba(120,156,248,0.4)}

    /* ═══════ 悬停效果 ═══════ */
    .abby-yog-card:hover .scan-beam::after{animation-duration:14s;background:linear-gradient(90deg,transparent 5%,rgba(168,192,255,0.035),rgba(255,255,255,0.09) 30%,rgba(255,255,255,0.12) 50%,rgba(255,255,255,0.09) 70%,rgba(168,192,255,0.035),transparent 95%)}
    .abby-yog-card:hover .star-layer{filter:brightness(1.3)}

    .abby-yog-card:hover .stars-2{opacity:.62;animation-duration:110s}
    .abby-yog-card:hover .stars-3{opacity:.55;animation-duration:85s}
    .abby-yog-card:hover .stars-4{opacity:.45;animation-duration:150s}
    .abby-yog-card:hover .stars-5{opacity:.55;animation-duration:45s}
    .abby-yog-card:hover .stars-6{opacity:.6;animation-duration:100s}

    /* ═══════ 悬停时表盘展开效果 ═══════ */
    /* 悬停时外圈扩大到76px（向外推开），配合内圈的放大，形成强烈的层级展开感 */
    .abby-yog-card:hover .ring-outer{

      height:76px !important;

      left:-38px !important;

      animation-duration:20s;
      -webkit-mask:radial-gradient(transparent 58%,black 60%);
      mask:radial-gradient(transparent 58%,black 60%)
    }
    
    /* 悬停时内圈扩大到54px（半径27px），边缘刚好与钥匙齿的终点（22+5=27px）完美重合 */

      width:54px !important;
      height:54px !important;
      top:-27px !important;
      left:-27px !important;
      opacity:.9;
      filter:drop-shadow(0 0 3px var(--glow-blue));
      animation-duration:12s;
      -webkit-mask:radial-gradient(transparent 52%,black 54%);
      mask:radial-gradient(transparent 52%,black 54%)
    }
    /* 悬停时钥匙旋转加速 */
    .abby-yog-card:hover .eldritch-key-group{animation-duration:8s;filter:drop-shadow(0 0 7px var(--light-blue)) brightness(1.2)}
    .abby-yog-card:hover .dimension-ripple{animation:ripple-burst 1.5s ease-out infinite}
    .abby-yog-card:hover .gal-frame::before{box-shadow:0 0 14px var(--frame-glow),0 0 32px rgba(80,116,206,0.28),inset 0 0 14px var(--frame-glow)}
    .abby-yog-card:hover .dialog-box{box-shadow:0 0 16px rgba(80,116,206,0.2),0 12px 26px rgba(0,0,0,0.38),inset 0 1px 0 rgba(200,220,255,0.14),inset 0 0 24px rgba(80,116,206,0.08)}

    /* ═══════ 响应式 ═══════ */

    /* ═══════ 动画定义 ═══════ */
    @keyframes star-cw{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

    @keyframes dust-fall{from{transform:translate3d(0,-12px,0)}to{transform:translate3d(0,12px,0)}}

<script>
/* 数据注入优先级：

 * 3) Foreigner 标签正则匹配（最终回退）。

$(document).ready(function(){
  var card=document.querySelector('.abby-yog-card');
  if(!card)return;
  var nameEl=card.querySelector('.abby-name-text');
  var contentEl=card.querySelector('.abby-yog-content');
  var portraitEl=card.querySelector('.portrait-inner');
  var moodAlias={'高兴':'高兴','开心':'高兴','喜悦':'高兴','悲伤':'悲伤','难过':'悲伤','害羞':'害羞','生气':'生气','愤怒':'生气','疑惑':'疑惑','困惑':'困惑'};
  
  // 读取 URL 参数中的角色名、情绪和台词内容。
  function getUrlParam(name){
    var params=new URLSearchParams(window.location.search);
    return params.get(name);
  }
  
  // 将解析到的数据应用到 UI。
  function updateContent(name,mood,content){
    if(name&&nameEl)nameEl.textContent=name;
    if(content&&contentEl)contentEl.textContent=content;
    if(portraitEl&&mood){
      var mappedMood=moodAlias[mood]||mood||'高兴';
      portraitEl.style.backgroundImage="url('https://cdn.jsdelivr.net/gh/AkabaneSaki/myrepo@main/picture/abby/"+mappedMood+"0.png')";
    }
  }
  
  var urlName=getUrlParam('name');
  var urlMood=getUrlParam('mood');
  var urlContent=getUrlParam('content');
  if(urlName||urlContent){
    updateContent(urlName||'阿比盖尔',urlMood||'高兴',urlContent||'你好！');
    return;
  }
  
  // 未传 URL 参数时，尝试读取父页面透传数据。
  try{
    var parentData=window.parent.document.querySelector('[data-name][data-mood][data-content]');
    if(parentData){
      updateContent(parentData.dataset.name||'阿比盖尔',parentData.dataset.mood||'高兴',parentData.dataset.content||'你好！');
      return;
    }
  }catch(e){}
  
  // 最终回退：直接在当前文档中匹配 Foreigner 标签内容。
  var rx=new RegExp('<Foreigner\\b[^>]*name=["\']([^"\']+)["\'][^>]*mood=["\']([^"\']+)["\'][^>]*>([\\s\\S]*?)<\/Foreigner>', 'i');
  var html=document.body.innerHTML;
  var m=html.match(rx);
  if(m){
    updateContent((m[1]||'').trim(),moodAlias[(m[2]||'').trim()]||'高兴',(m[3]||'').trim());
  }
});
</script>
</body>
</html>
